name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ff4500&color_dots=#0d0000,#3d0000,#7a0000,#b22200,#ff4500
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ff4500&color_dots=#0d0000,#3d0000,#7a0000,#b22200,#ff4500

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.SNAKE_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true